name: ket_flashcard
description: KET单词闪卡 - 跨平台学习应用
publish_to: 'none'
version: 2.0.1+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.0.2
  shared_preferences: ^2.2.2
  audioplayers: ^6.0.0
  google_fonts: ^6.1.0
  pdf: ^3.10.8
  path_provider: ^2.1.2
  printing: ^5.12.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/words.json
    - assets/articles.json
    - assets/xyj.json
    - assets/illustrations/
    - assets/fonts/
  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
